<section class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card">
      <div class="card-body p-4">
        <h2 class="page-title">Create Complaint</h2>
        <p class="page-subtitle">Capture and route a new complaint for resolution.</p>

        <form [formGroup]="form" (ngSubmit)="submit()" class="d-grid gap-3">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Client ID (Optional)</label>
              <input class="form-control" type="number" formControlName="clientId" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Client Name (Optional)</label>
              <input class="form-control" formControlName="clientName" />
            </div>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Client Email (Optional)</label>
              <input class="form-control" type="email" formControlName="clientEmail" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Client Mobile (Optional)</label>
              <input class="form-control" formControlName="clientMobile" />
            </div>
          </div>
          <div>
            <label class="form-label">Subject</label>
            <input class="form-control" formControlName="subject" />
          </div>
          <div>
            <label class="form-label">Description</label>
            <textarea class="form-control" rows="5" formControlName="description"></textarea>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Complaint Channel</label>
              <select class="form-select" formControlName="complaintChannelId">
                <option [value]="1">Call Center</option>
                <option [value]="2">Email</option>
                <option [value]="3">WhatsApp</option>
                <option [value]="4">Web Portal</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Complaint Category ID</label>
              <input class="form-control" type="number" formControlName="complaintCategoryId" />
            </div>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Sub Category ID (Optional)</label>
              <input class="form-control" type="number" formControlName="subCategoryId" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Priority</label>
              <select class="form-select" formControlName="priority">
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
                <option>Critical</option>
              </select>
            </div>
          </div>
          <div class="text-end">
            <button class="btn btn-primary" type="submit">Create Complaint</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
