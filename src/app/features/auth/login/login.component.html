<div class="login-page container-fluid">
  <div class="row min-vh-100">
    <div class="col-lg-5 d-flex align-items-center justify-content-center p-4">
      <div class="surface p-4 p-md-5 login-card w-100">
        <h1 class="mb-2">CompliMate CMS</h1>
        <p class="text-muted mb-4">Sign in to continue to complaint operations.</p>

        <form [formGroup]="form" (ngSubmit)="submit()" class="d-grid gap-3">
          <div>
            <label class="form-label">EmailOrUsername</label>
            <input type="text" class="form-control" formControlName="emailOrUsername" />
          </div>
          <div>
            <label class="form-label">Password</label>
            <input type="password" class="form-control" formControlName="password" />
          </div>

          @if (error) {
            <div class="alert alert-danger py-2">{{ error }}</div>
          }

          <button class="btn btn-primary" type="submit" [disabled]="loading">
            {{ loading ? 'Signing in...' : 'Sign In' }}
          </button>
        </form>
      </div>
    </div>
    <div class="col-lg-7 hero d-none d-lg-flex align-items-center justify-content-center">
      <div>
        <h2>Complaint intelligence, resolution speed, and audit-ready controls.</h2>
        <p class="text-muted">Bootstrap + custom design system foundation for Admin, Agent, and Client portals.</p>
      </div>
    </div>
  </div>
</div>
