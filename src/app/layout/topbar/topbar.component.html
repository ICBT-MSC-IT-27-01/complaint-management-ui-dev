<header class="topbar px-4 py-3 d-flex align-items-center gap-3">
  <div class="topbar-search flex-grow-1">
    <i class="bi bi-search"></i>
    <input type="text" class="form-control" placeholder="Search cases, users, reports..." />
  </div>

  <button class="btn btn-link text-muted p-0"><i class="bi bi-bell fs-5"></i></button>

  <div class="profile-chip d-flex align-items-center gap-2">
    <div class="avatar">{{ user()?.fullName?.charAt(0) || 'U' }}</div>
    <div>
      <div class="fw-semibold">{{ user()?.fullName || 'User' }}</div>
      <small class="text-muted">{{ user()?.role || 'Role' }}</small>
    </div>
  </div>

  <a routerLink="/login" class="btn btn-outline-secondary btn-sm" (click)="logout()">Logout</a>
</header>
