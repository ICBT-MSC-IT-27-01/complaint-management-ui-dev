<section>
  <h2 class="page-title">Client Ticket {{ complaint()?.ComplaintNumber || ('#' + id) }}</h2>
  <p class="page-subtitle">{{ complaint()?.Subject || 'Conversation timeline and reply panel.' }}</p>

  <div class="card mb-3">
    <div class="card-body">
      <div class="chat-bubble agent">Hello, thanks for reporting this. Please share additional details for faster resolution.</div>
      <div class="chat-bubble client">{{ complaint()?.Description || 'No complaint details available.' }}</div>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <label class="form-label">Reply</label>
      <textarea class="form-control" rows="4" placeholder="Type your reply..."></textarea>
      <div class="text-end mt-3">
        <button class="btn btn-primary">Send Reply</button>
      </div>
    </div>
  </div>
</section>
